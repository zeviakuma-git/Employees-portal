<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h2>Employee Dashboard</h2>

  <p><strong>Logged in as:</strong> <span id="userEmail"></span></p>

  <hr>

  <p><strong>Working Hours:</strong> <span id="hours"></span></p>
  <p><strong>Rate per Hour:</strong> <span id="rate"></span></p>
  <p><strong>Salary:</strong> <span id="salary"></span></p>

  <br><br>

  <button onclick="logout()">Logout</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBS-lCINak9jWXYT3MnpvRuQMshgQuLcH0",
      authDomain: "employeeportal-915c8.firebaseapp.com",
      projectId: "employeeportal-915c8",
      storageBucket: "employeeportal-915c8.firebasestorage.app",
      messagingSenderId: "556161846372",
      appId: "1:556161846372:web:5405be69c95f16ff4ca371",
      measurementId: "G-CESR07FTYP"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("userEmail").innerText = user.email;

        db.collection("employees").doc(user.email).get()
          .then(doc => {
            if (doc.exists) {
              const data = doc.data();

              document.getElementById("hours").innerText = data.hours;
              document.getElementById("rate").innerText = data.rate;
              document.getElementById("salary").innerText = data.salary;
            } else {
              alert("No data found");
            }
          });

      } else {
        window.location.href = "index.html";
      }
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = "index.html";
      });
    }
  </script>

</body>
</html>
