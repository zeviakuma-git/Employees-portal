<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h2>Admin Panel</h2>

  <input type="email" id="email" placeholder="Employee Email"><br><br>
  <input type="number" id="hours" placeholder="Working Hours"><br><br>
  <input type="number" id="rate" placeholder="Rate per Hour"><br><br>

  <button onclick="saveData()">Save Employee</button>

  <p id="msg"></p>

  <script>
    const adminPassword = "65224";
    const entered = prompt("Enter admin password:");

    if (entered !== adminPassword) {
      alert("Access denied");
      window.location.href = "index.html";
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBS-lCINak9jWXYT3MnpvRuQMshgQuLcH0",
      authDomain: "employeeportal-915c8.firebaseapp.com",
      projectId: "employeeportal-915c8",
      storageBucket: "employeeportal-915c8.firebasestorage.app",
      messagingSenderId: "556161846372",
      appId: "1:556161846372:web:5405be69c95f16ff4ca371",
      measurementId: "G-CESR07FTYP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function saveData() {
      const email = document.getElementById("email").value;
      const hours = Number(document.getElementById("hours").value);
      const rate = Number(document.getElementById("rate").value);

      if (!email || !hours || !rate) {
        alert("Please fill all fields");
        return;
      }

      const salary = hours * rate;

      db.collection("employees").doc(email).set({
        hours: hours,
        rate: rate,
        salary: salary
      })
      .then(() => {
        document.getElementById("msg").innerText = "Saved successfully!";
      })
      .catch(error => {
        alert(error.message);
      });
    }
  </script>

</body>
</html>
